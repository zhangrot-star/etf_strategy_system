# ── ETF Quant Strategy System — Global Configuration ──

market: "A"                    # "A" = A-share (akshare), "US" = US market (yfinance)

# Data pipeline
data:
  tickers:
    A: ["510050","510300","510500","159915","588000","159845","515050","159995","159819","512720","516510","512880","512690","512010","516970","512660","515790","512800","515220","511010","511260","518880"]
    US: ["SPY", "QQQ", "IWM", "XLK", "XLC", "XLV"]
  start_date: "2023-01-01"
  end_date: null               # null = today
  cache_dir: "./data/cache"

# LLM
llm:
  provider: "deepseek"          # deepseek | claude | openai
  model: "deepseek-v4-pro"
  max_tokens: 1024
  temperature: 0.1
  max_retries: 3
  batch_size: 10
  batch_delay_sec: 0.5

# Factors
factors:
  momentum_windows: [5, 10, 21, 63]
  volatility_window: 21
  winsorize_bounds: [0.01, 0.99]
  rsi_period: 14
  atr_period: 14

# XGBoost
xgboost:
  max_depth: 6
  learning_rate: 0.05
  n_estimators: 200
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  min_child_weight: 3
  refit_frequency: "quarterly"

# Risk control
risk:
  breach_polarity: -0.7
  warn_polarity: -0.5
  breach_confidence: 0.85
  single_position_cap: 0.30
  max_positions: 8

# Backtest
backtest:
  initial_capital: 1_000_000.0
  commission_rate: 0.0003      # 3 bps per side
  slippage_bps: 1.0
  rebalance_frequency: "monthly"
  lookback_days: 252

# Optuna
optuna:
  n_trials: 100
  cv_folds: 5
  oos_ratio: 0.2
  study_name: "xgboost_etf_optimization"
  storage: "sqlite:///optuna.db"

# Recommendation pipeline
recommendation:
  model_path: "models/xgboost_etf"
  top_n: 10
  min_aum: 100000000
  min_age_days: 180
  max_per_sector: 3
  default_weight_method: "score_weighted"

# Prediction pipeline
prediction:
  model_path: "models/xgboost_reg"
  horizons: [5, 21, 63]
  retrain_frequency: "quarterly"

# ── RL Portfolio Optimization ──
rl:
  enabled: false
  model_path: "models/rl/ppo_portfolio"
  total_timesteps: 200000
  rebalance_freq: "monthly"
  ppo:
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    ent_coef: 0.01
  reward:
    sharpe_weight: 1.0
    turnover_weight: 0.5
    drawdown_weight: 1.0
    diversification_weight: 0.2
  walk_forward:
    n_folds: 5
    validation_months: 12

# Execution
execution:
  broker: "paper"
  dry_run: true
  min_trade_amount: 5000
  rebalance_threshold: 0.01
  max_single_order: 100000
  circuit_breaker: true
  max_daily_turnover: 0.3
  order_timeout: 60

# Schedule
schedule:
  enabled: false
  cron: "0 15 * * 1-5"
  timezone: "Asia/Shanghai"

# Notification
notification:
  enabled: false
  webhook_url: ""

# API
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4

# ── Bank Analyzer ─────────────────────────────────────────────────
bank_analyzer:
  enabled: true
  use_synthetic_data: true              # 当 akshare 不可用时使用行业基准推算
  model_path: "models/bank_scorer"      # XGBoost 模型路径
  report_output_dir: "./reports/bank"   # 银行分析报告输出目录

  # 银行合作潜力评分权重
  scoring:
    scale_weight: 0.25                  # Module A: 规模与市场地位
    card_quality_weight: 0.30           # Module B: 信用卡业务质量
    digital_weight: 0.25                # Module C: 数字化能力
    stability_weight: 0.20              # Module D: 风险与稳定性

  # 痛点分析
  pain_point:
    llm_provider: "deepseek"            # deepseek | claude
    llm_model: "deepseek-v4-pro"
    use_template_fallback: true         # LLM 不可用时使用模板回退
    concurrency_sleep: 0.5              # 批量分析时的请求间隔（秒）

  # 可配置的监控银行列表（默认全部 18 家）
  monitored_banks:
    - "ICBC"    # 工商银行
    - "CCB"     # 建设银行
    - "ABC"     # 农业银行
    - "BOC"     # 中国银行
    - "BOCOM"   # 交通银行
    - "PSBC"    # 邮储银行
    - "CMB"     # 招商银行
    - "CITIC"   # 中信银行
    - "SPDB"    # 浦发银行
    - "CMBC"    # 民生银行
    - "CIB"     # 兴业银行
    - "CEB"     # 光大银行
    - "PAB"     # 平安银行
    - "HXB"     # 华夏银行
    - "GDB"     # 广发银行
    - "BQD"     # 浙商银行
    - "BOB"     # 渤海银行
    - "HFB"     # 恒丰银行
